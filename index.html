<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מערכת בקשות יציאה | מילואים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --olive: #4a5c2f; --olive-dark: #2e3a1a; --olive-light: #6b7f45;
    --sand-light: #e8dcc8; --sand-pale: #f5efe4;
    --red: #c0392b; --green-ok: #27ae60; --yellow: #e67e22;
    --blue: #2980b9; --white: #fdfaf5;
    --text: #1a1a12; --text-muted: #6b6b55; --border: #d4c9b0;
    --shadow: 0 4px 24px rgba(74,92,47,0.13); --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', sans-serif; background: var(--sand-pale); color: var(--text); min-height: 100vh; font-size: 15px; }
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* LOGIN */
  #loginScreen { background: linear-gradient(160deg, var(--olive-dark) 0%, var(--olive) 50%, var(--olive-light) 100%); align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden; }
  #loginScreen::before { content: ''; position: absolute; top: -60px; right: -60px; width: 260px; height: 260px; border-radius: 50%; background: rgba(255,255,255,0.05); }
  #loginScreen::after  { content: ''; position: absolute; bottom: -80px; left: -40px; width: 320px; height: 320px; border-radius: 50%; background: rgba(255,255,255,0.04); }
  .login-card { background: var(--white); border-radius: 24px; padding: 40px 32px; width: 100%; max-width: 400px; box-shadow: 0 24px 80px rgba(0,0,0,0.35); position: relative; z-index: 1; }
  .login-emblem { width: 64px; height: 64px; background: var(--olive); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; }
  .login-title { text-align: center; font-size: 22px; font-weight: 800; color: var(--olive-dark); margin-bottom: 4px; }
  .login-sub { text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
  .form-control { width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 15px; color: var(--text); background: white; transition: border-color .2s; outline: none; -webkit-appearance: none; }
  .form-control:focus { border-color: var(--olive-light); }
  textarea.form-control { resize: vertical; min-height: 80px; }
  .btn-primary { width: 100%; padding: 14px; background: var(--olive); color: white; border: none; border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: background .2s; margin-top: 4px; }
  .btn-primary:active { background: var(--olive-dark); }
  .error-msg { color: var(--red); font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; }

  /* TOPBAR */
  .topbar { background: var(--olive-dark); color: white; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.25); }
  .topbar-title { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .topbar-subtitle { font-size: 12px; color: var(--sand-light); margin-top: 1px; }
  .btn-logout { background: rgba(255,255,255,0.12); border: none; color: white; padding: 7px 12px; border-radius: 8px; font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }

  /* CONTENT */
  .content { padding: 18px; max-width: 700px; margin: 0 auto; width: 100%; flex: 1; }

  /* CARDS */
  .card { background: white; border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); margin-bottom: 14px; border: 1px solid var(--border); }
  .card-title { font-size: 15px; font-weight: 700; color: var(--olive-dark); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .badge-pending  { background: #fff3e0; color: var(--yellow); }
  .badge-approved { background: #e8f5e9; color: var(--green-ok); }
  .badge-rejected { background: #ffebee; color: var(--red); }

  /* REQ CARDS */
  .req-card { border: 1.5px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; background: var(--white); }
  .req-card.pending  { border-right: 4px solid var(--yellow); }
  .req-card.approved { border-right: 4px solid var(--green-ok); }
  .req-card.rejected { border-right: 4px solid var(--red); }
  .req-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
  .req-name   { font-size: 15px; font-weight: 700; color: var(--olive-dark); }
  .req-dates  { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
  .req-reason { font-size: 13px; color: var(--text); background: var(--sand-pale); padding: 7px 10px; border-radius: 8px; margin-bottom: 10px; line-height: 1.5; }
  .req-actions { display: flex; gap: 8px; }
  .btn-approve, .btn-reject { flex: 1; padding: 8px; border: none; border-radius: 8px; font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-approve { background: var(--green-ok); color: white; }
  .btn-reject  { background: var(--red); color: white; }

  /* NEW REQ */
  .new-req-toggle { width: 100%; padding: 14px; background: var(--olive); color: white; border: none; border-radius: var(--radius); font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn-submit { width: 100%; padding: 12px; background: var(--olive); color: white; border: none; border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat-card { background: white; border-radius: 12px; padding: 14px 10px; text-align: center; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .stat-num   { font-size: 26px; font-weight: 900; color: var(--olive-dark); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 600; }

  /* SOLDIERS */
  .soldier-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .soldier-row:last-child { border-bottom: none; }
  .soldier-avatar { width: 38px; height: 38px; background: var(--olive); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: white; flex-shrink: 0; }
  .soldier-info  { flex: 1; padding: 0 12px; }
  .soldier-name  { font-weight: 700; font-size: 15px; }
  .soldier-reqs  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .pending-count { background: var(--yellow); color: white; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 20px; cursor: pointer; }

  /* ADD SOLDIER */
  .add-soldier-row { display: flex; gap: 8px; }
  .add-soldier-row .form-control { flex: 1; margin-bottom: 0; }
  .btn-add { padding: 11px 16px; background: var(--olive); color: white; border: none; border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 20px; cursor: pointer; }

  /* FILTER */
  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
  .filter-btn { padding: 7px 14px; border: 2px solid var(--border); border-radius: 20px; background: white; font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; color: var(--text-muted); }
  .filter-btn.active { background: var(--olive); border-color: var(--olive); color: white; }

  /* TOAST */
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--olive-dark); color: white; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,0.3); transition: transform .3s cubic-bezier(.34,1.56,.64,1); max-width: 90vw; text-align: center; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: flex-end; }
  .modal-overlay.active { display: flex; }
  .modal-sheet { background: var(--white); border-radius: 20px 20px 0 0; padding: 20px 18px; width: 100%; max-height: 85vh; overflow-y: auto; animation: slideUp .3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 18px; font-weight: 800; color: var(--olive-dark); margin-bottom: 16px; text-align: center; }
  .btn-close-modal { display: block; width: 100%; padding: 12px; background: var(--sand-light); border: none; border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 12px; color: var(--text); }

  .empty-state { text-align: center; padding: 32px; color: var(--text-muted); font-size: 14px; }
  .empty-icon  { font-size: 40px; margin-bottom: 10px; }

  /* LOADING */
  .loading-overlay { position: fixed; inset: 0; background: rgba(46,58,26,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px; }
  .loading-overlay.hidden { display: none; }
  .spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: white; font-size: 15px; font-weight: 600; }
  .notification-dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.6; transform:scale(1.3); } }

  /* ====== CALENDAR ====== */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-month-label { font-size: 17px; font-weight: 800; color: var(--olive-dark); }
  .cal-nav-btn { background: var(--sand-pale); border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 14px; font-family: 'Heebo', sans-serif; font-size: 18px; cursor: pointer; color: var(--olive-dark); font-weight: 700; }
  .cal-nav-btn:active { background: var(--sand-light); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-header-cell { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-muted); padding: 4px 0 6px; }

  .cal-day {
    border-radius: 10px;
    padding: 5px 3px;
    min-height: 72px;
    background: white;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: border-color .15s;
    overflow: hidden;
    position: relative;
  }
  .cal-day:active { border-color: var(--olive); }
  .cal-day.today { border-color: var(--olive); border-width: 2px; }
  .cal-day.other-month { background: var(--sand-pale); opacity: 0.5; cursor: default; }
  .cal-day.today .cal-day-num { background: var(--olive); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }

  .cal-day-num { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }

  .cal-bar-wrap { display: flex; flex-direction: column; gap: 2px; }
  .cal-bar { height: 5px; border-radius: 3px; width: 100%; }
  .cal-bar.home { background: var(--red); }
  .cal-bar.base { background: var(--green-ok); }

  .cal-counts { display: flex; flex-direction: column; gap: 1px; margin-top: 2px; }
  .cal-count-row { display: flex; align-items: center; gap: 2px; font-size: 9px; font-weight: 700; line-height: 1.2; }
  .cal-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .cal-dot.home { background: var(--red); }
  .cal-dot.base { background: var(--green-ok); }
  .cal-count-num { color: var(--text); }

  /* LEGEND */
  .cal-legend { display: flex; gap: 16px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
  .cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* DAY DETAIL MODAL */
  .day-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .day-detail-date { font-size: 20px; font-weight: 900; color: var(--olive-dark); }
  .day-section-title { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin: 12px 0 6px; }
  .soldier-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--sand-pale); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 13px; font-weight: 600; margin: 2px; }
  .soldier-chip.home-chip { background: #ffebee; border-color: #f5b7b1; color: var(--red); }
  .soldier-chip.base-chip { background: #e8f5e9; border-color: #a9dfbf; color: #1e8449; }
  .chips-wrap { display: flex; flex-wrap: wrap; gap: 4px; }
  .count-summary { display: flex; gap: 10px; margin-bottom: 14px; }
  .count-pill { flex: 1; padding: 10px; border-radius: 10px; text-align: center; }
  .count-pill.home-pill { background: #ffebee; }
  .count-pill.base-pill { background: #e8f5e9; }
  .count-pill-num { font-size: 22px; font-weight: 900; }
  .count-pill.home-pill .count-pill-num { color: var(--red); }
  .count-pill.base-pill .count-pill-num { color: var(--green-ok); }
  .count-pill-label { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">מתחבר לשרת...</div>
</div>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="screen" id="loginScreen">
  <div class="login-card">
    <div class="login-emblem">🪖</div>
    <div class="login-title">מערכת בקשות יציאה</div>
    <div class="login-sub">מילואים — כניסה לחשבון</div>
    <div class="form-group">
      <label>שם מלא</label>
      <input type="text" class="form-control" id="soldierNameInput" placeholder="ישראל ישראלי" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="form-group">
      <label>סיסמה <span style="font-weight:400;color:var(--text-muted)">(לוחמים — השאר ריק)</span></label>
      <input type="password" class="form-control" id="loginPassInput" placeholder="••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-primary" onclick="login()">כניסה</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- SOLDIER -->
<div class="screen" id="soldierScreen">
  <div class="topbar">
    <div>
      <div class="topbar-title">🪖 <span id="soldierTopName"></span></div>
      <div class="topbar-subtitle">בקשות יציאה</div>
    </div>
    <button class="btn-logout" onclick="logout()">יציאה</button>
  </div>
  <div class="content">
    <button class="new-req-toggle" onclick="toggleNewReqForm()">
      <span id="newReqIcon">＋</span> הגשת בקשה חדשה
    </button>
    <div class="card" id="newReqForm" style="display:none">
      <div class="card-title">📝 בקשה חדשה</div>
      <div class="form-row">
        <div class="form-group"><label>תאריך יציאה</label><input type="date" class="form-control" id="reqDateOut"></div>
        <div class="form-group"><label>תאריך חזרה</label><input type="date" class="form-control" id="reqDateIn"></div>
      </div>
      <div class="form-group">
        <label>סיבת הבקשה</label>
        <textarea class="form-control" id="reqReason" placeholder="פרטו את הסיבה לבקשת היציאה..."></textarea>
      </div>
      <button class="btn-submit" onclick="submitRequest()">שלח בקשה</button>
    </div>
    <div class="card">
      <div class="card-title">📋 הבקשות שלי</div>
      <div id="myRequestsList"><div class="empty-state"><div class="empty-icon">📭</div>אין בקשות עדיין</div></div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div class="screen" id="adminScreen">
  <div class="topbar">
    <div>
      <div class="topbar-title">⚙️ ממשק מנהל <span id="pendingDot"></span></div>
      <div class="topbar-subtitle">ניהול בקשות</div>
    </div>
    <button class="btn-logout" onclick="logout()">יציאה</button>
  </div>
  <div class="content">

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">סה"כ</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--yellow)" id="statPending">0</div><div class="stat-label">ממתינות</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green-ok)" id="statApproved">0</div><div class="stat-label">אושרו</div></div>
    </div>

    <!-- CALENDAR -->
    <div class="card">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calPrev()">‹</button>
        <div class="cal-month-label" id="calMonthLabel"></div>
        <button class="cal-nav-btn" onclick="calNext()">›</button>
      </div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="legend-dot" style="background:var(--red)"></div>בבית (אושר)</div>
        <div class="cal-legend-item"><div class="legend-dot" style="background:var(--green-ok)"></div>במוצב</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- ADD SOLDIER -->
    <div class="card">
      <div class="card-title">👤 הוספת לוחם</div>
      <div class="add-soldier-row">
        <input type="text" class="form-control" id="newSoldierName" placeholder="שם מלא של הלוחם" onkeydown="if(event.key==='Enter')addSoldier()">
        <button class="btn-add" onclick="addSoldier()">＋</button>
      </div>
    </div>

    <!-- FILTER + REQUESTS -->
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all')">הכל</button>
      <button class="filter-btn" onclick="setFilter('pending')">⏳ ממתינות</button>
      <button class="filter-btn" onclick="setFilter('approved')">✅ אושרו</button>
      <button class="filter-btn" onclick="setFilter('rejected')">❌ נדחו</button>
    </div>
    <div class="card">
      <div class="card-title">📋 כל הבקשות</div>
      <div id="allRequestsList"></div>
    </div>
    <div class="card">
      <div class="card-title">👥 רשימת לוחמים</div>
      <div id="soldiersList"></div>
    </div>
  </div>
</div>

<!-- SOLDIER MODAL -->
<div class="modal-overlay" id="soldierModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalSoldierName"></div>
    <div id="modalRequestsList"></div>
    <button class="btn-close-modal" onclick="closeModal('soldierModal')">סגירה</button>
  </div>
</div>

<!-- DAY DETAIL MODAL -->
<div class="modal-overlay" id="dayModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div id="dayModalContent"></div>
    <button class="btn-close-modal" onclick="closeModal('dayModal')">סגירה</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHBGGi-iqYn4lcQxMI24OwO2_-No5ykS0",
  authDomain: "miluim-requests.firebaseapp.com",
  databaseURL: "https://miluim-requests-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "miluim-requests",
  storageBucket: "miluim-requests.firebasestorage.app",
  messagingSenderId: "22930888173",
  appId: "1:22930888173:web:b652d34b596864305fc3e4"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ====== TEAM (hardcoded) ======
const TEAM = [
  'אביב פורטל','ארז לוי','נדב ששון','מאיר שטריגלר','אליאס אשבר',
  'ראובן גוייטה','סער מנדיל','סער שטיינברג','רועי טל','אורי מיליגר',
  'אביאל איטח','עידן פוני','שמר','ראם שמואלי','רם בן דויד','יאיר צוובנר'
];
const TEAM_SIZE = TEAM.length;

const ADMIN_NAME = 'אביב פורטל';
const ADMIN_PASS = 'ap0468';

var currentUser      = null;
var currentFilter    = 'all';
var allRequests      = {};
var allSoldiers      = {};
var prevPendingCount = 0;

// Calendar state
var calYear, calMonth;
(function(){ var n = new Date(); calYear = n.getFullYear(); calMonth = n.getMonth(); })();

// ====== FIREBASE LISTENERS ======
onValue(ref(db, 'soldiers'), function(snap) {
  allSoldiers = snap.val() || {};
  if (currentUser && currentUser.type === 'admin') renderAdminScreen();
});

onValue(ref(db, 'requests'), function(snap) {
  allRequests = snap.val() || {};
  if (currentUser && currentUser.type === 'admin') {
    var pNow = Object.values(allRequests).filter(function(r){ return r.status==='pending'; }).length;
    if (prevPendingCount !== -1 && pNow > prevPendingCount) showToast('🔔 בקשה חדשה הגיעה!');
    prevPendingCount = pNow;
    renderAdminScreen();
  }
  if (currentUser && currentUser.type === 'soldier') renderMyRequests();
});

setTimeout(function(){
  document.getElementById('loadingOverlay').classList.add('hidden');
  showScreen('loginScreen');
}, 1800);

// ====== AUTH ======
window.login = function() {
  var name  = document.getElementById('soldierNameInput').value.trim();
  var pass  = document.getElementById('loginPassInput').value;
  var errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!name) { errEl.textContent = 'נא הזן שם מלא'; return; }
  if (name === ADMIN_NAME) {
    if (pass !== ADMIN_PASS) { errEl.textContent = 'סיסמה שגויה'; return; }
    currentUser = { type: 'admin', name: ADMIN_NAME };
    prevPendingCount = -1;
    showScreen('adminScreen');
    renderAdminScreen();
    return;
  }
  var foundId = null;
  for (var sid in allSoldiers) { if (allSoldiers[sid].name === name) { foundId = sid; break; } }
  if (!foundId) {
    var nr = push(ref(db, 'soldiers'));
    foundId = nr.key;
    set(nr, { id: foundId, name: name });
  }
  currentUser = { type: 'soldier', id: foundId, name: name };
  showScreen('soldierScreen');
  renderSoldierScreen();
};

window.logout = function() {
  currentUser = null; prevPendingCount = 0;
  document.getElementById('soldierNameInput').value = '';
  document.getElementById('loginPassInput').value = '';
  document.getElementById('loginError').textContent = '';
  showScreen('loginScreen');
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

// ====== SOLDIER ======
function renderSoldierScreen() {
  document.getElementById('soldierTopName').textContent = currentUser.name;
  renderMyRequests();
}

window.toggleNewReqForm = function() {
  var form = document.getElementById('newReqForm');
  var icon = document.getElementById('newReqIcon');
  var hidden = form.style.display === 'none' || form.style.display === '';
  form.style.display = hidden ? 'block' : 'none';
  icon.textContent = hidden ? '−' : '＋';
};

window.submitRequest = function() {
  var dateOut = document.getElementById('reqDateOut').value;
  var dateIn  = document.getElementById('reqDateIn').value;
  var reason  = document.getElementById('reqReason').value.trim();
  if (!dateOut || !dateIn || !reason) { showToast('❗ נא מלא את כל השדות'); return; }
  if (dateIn < dateOut) { showToast('❗ תאריך חזרה חייב להיות אחרי תאריך יציאה'); return; }
  var nr = push(ref(db, 'requests'));
  set(nr, { id: nr.key, soldierId: currentUser.id, soldierName: currentUser.name,
    dateOut: dateOut, dateIn: dateIn, reason: reason, status: 'pending', createdAt: new Date().toISOString() });
  document.getElementById('reqDateOut').value = '';
  document.getElementById('reqDateIn').value = '';
  document.getElementById('reqReason').value = '';
  document.getElementById('newReqForm').style.display = 'none';
  document.getElementById('newReqIcon').textContent = '＋';
  showToast('✅ הבקשה נשלחה בהצלחה!');
};

function renderMyRequests() {
  var myReqs = Object.values(allRequests).filter(function(r){ return r.soldierId === currentUser.id; });
  myReqs.sort(function(a,b){ return new Date(b.createdAt) - new Date(a.createdAt); });
  var el = document.getElementById('myRequestsList');
  if (!el) return;
  el.innerHTML = myReqs.length === 0
    ? '<div class="empty-state"><div class="empty-icon">📭</div>אין בקשות עדיין</div>'
    : myReqs.map(function(r){ return buildReqCard(r, false); }).join('');
}

// ====== ADMIN ======
function renderAdminScreen() {
  renderStats();
  renderCalendar();
  renderAllRequests();
  renderSoldiersList();
  updatePendingDot();
}

function renderStats() {
  var reqs = Object.values(allRequests);
  document.getElementById('statTotal').textContent    = reqs.length;
  document.getElementById('statPending').textContent  = reqs.filter(function(r){ return r.status==='pending'; }).length;
  document.getElementById('statApproved').textContent = reqs.filter(function(r){ return r.status==='approved'; }).length;
}

function updatePendingDot() {
  var p = Object.values(allRequests).filter(function(r){ return r.status==='pending'; }).length;
  document.getElementById('pendingDot').innerHTML = p > 0 ? '<span class="notification-dot"></span>' : '';
}

// ====== CALENDAR ======
var HE_DAYS   = ['א','ב','ג','ד','ה','ו','ש'];
var HE_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

window.calPrev = function() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); };
window.calNext = function() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); };

function dateStr(y, m, d) {
  return y + '-' + (m+1<10?'0':'') + (m+1) + '-' + (d<10?'0':'') + d;
}

// Returns how many soldiers from TEAM are "home" (approved leave) on a given date string
function getSoldierStatusOnDate(ds) {
  var home = [];
  var base = [];
  TEAM.forEach(function(name) {
    var onLeave = false;
    Object.values(allRequests).forEach(function(r) {
      if (r.soldierName === name && r.status === 'approved' && ds >= r.dateOut && ds <= r.dateIn) {
        onLeave = true;
      }
    });
    if (onLeave) home.push(name);
    else base.push(name);
  });
  return { home: home, base: base };
}

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = HE_MONTHS[calMonth] + ' ' + calYear;
  var grid = document.getElementById('calGrid');
  var today = new Date();
  var todayStr = dateStr(today.getFullYear(), today.getMonth(), today.getDate());

  // Header
  var html = HE_DAYS.map(function(d){ return '<div class="cal-header-cell">' + d + '</div>'; }).join('');

  // First day of month (0=Sun)
  var firstDay = new Date(calYear, calMonth, 1).getDay();
  var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  var daysInPrev  = new Date(calYear, calMonth, 0).getDate();

  // Fill blanks from previous month
  for (var i = 0; i < firstDay; i++) {
    var prevDay = daysInPrev - firstDay + 1 + i;
    html += '<div class="cal-day other-month"><div class="cal-day-num">' + prevDay + '</div></div>';
  }

  // Days of current month
  for (var d = 1; d <= daysInMonth; d++) {
    var ds = dateStr(calYear, calMonth, d);
    var status = getSoldierStatusOnDate(ds);
    var homeCount = status.home.length;
    var baseCount = status.base.length;
    var isToday = ds === todayStr;

    var barsHtml = '';
    if (homeCount > 0) barsHtml += '<div class="cal-bar home" style="width:' + Math.round(homeCount/TEAM_SIZE*100) + '%"></div>';
    if (baseCount > 0) barsHtml += '<div class="cal-bar base" style="width:' + Math.round(baseCount/TEAM_SIZE*100) + '%"></div>';

    html += '<div class="cal-day' + (isToday ? ' today' : '') + '" onclick="openDayModal(\'' + ds + '\')">' +
      '<div class="cal-day-num">' + d + '</div>' +
      '<div class="cal-bar-wrap">' + barsHtml + '</div>' +
      '<div class="cal-counts">' +
      (homeCount > 0 ? '<div class="cal-count-row"><div class="cal-dot home"></div><span class="cal-count-num">' + homeCount + ' בבית</span></div>' : '') +
      '<div class="cal-count-row"><div class="cal-dot base"></div><span class="cal-count-num">' + baseCount + ' במוצב</span></div>' +
      '</div></div>';
  }

  // Fill remainder
  var totalCells = firstDay + daysInMonth;
  var remainder  = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (var j = 1; j <= remainder; j++) {
    html += '<div class="cal-day other-month"><div class="cal-day-num">' + j + '</div></div>';
  }

  grid.innerHTML = html;
}

// ====== DAY MODAL ======
window.openDayModal = function(ds) {
  var status = getSoldierStatusOnDate(ds);
  var parts  = ds.split('-');
  var label  = parts[2] + '/' + parts[1] + '/' + parts[0];

  var html = '<div class="day-detail-header"><div class="day-detail-date">📅 ' + label + '</div></div>';

  html += '<div class="count-summary">' +
    '<div class="count-pill home-pill"><div class="count-pill-num">' + status.home.length + '</div><div class="count-pill-label">🏠 בבית</div></div>' +
    '<div class="count-pill base-pill"><div class="count-pill-num">' + status.base.length + '</div><div class="count-pill-label">🪖 במוצב</div></div>' +
    '</div>';

  if (status.home.length > 0) {
    html += '<div class="day-section-title">🏠 בבית (' + status.home.length + ')</div><div class="chips-wrap">';
    status.home.forEach(function(n){ html += '<span class="soldier-chip home-chip">' + n + '</span>'; });
    html += '</div>';
  }

  html += '<div class="day-section-title">🪖 במוצב (' + status.base.length + ')</div><div class="chips-wrap">';
  status.base.forEach(function(n){ html += '<span class="soldier-chip base-chip">' + n + '</span>'; });
  html += '</div>';

  document.getElementById('dayModalContent').innerHTML = html;
  document.getElementById('dayModal').classList.add('active');
};

// ====== SOLDIERS LIST ======
function renderAllRequests() {
  var reqs = Object.values(allRequests).sort(function(a,b){ return new Date(b.createdAt) - new Date(a.createdAt); });
  if (currentFilter !== 'all') reqs = reqs.filter(function(r){ return r.status === currentFilter; });
  var el = document.getElementById('allRequestsList');
  if (!el) return;
  el.innerHTML = reqs.length === 0
    ? '<div class="empty-state"><div class="empty-icon">📭</div>אין בקשות</div>'
    : reqs.map(function(r){ return buildReqCard(r, true); }).join('');
}

function renderSoldiersList() {
  var soldiers = Object.values(allSoldiers);
  var el = document.getElementById('soldiersList');
  if (!el) return;
  if (soldiers.length === 0) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div>אין לוחמים</div>'; return; }
  el.innerHTML = soldiers.map(function(s) {
    var myReqs  = Object.values(allRequests).filter(function(r){ return r.soldierId === s.id; });
    var pending = myReqs.filter(function(r){ return r.status==='pending'; }).length;
    var badge   = pending > 0
      ? '<span class="pending-count" onclick="openSoldierModal(\'' + s.id + '\')">' + pending + ' ⏳</span>'
      : '<span style="font-size:12px;color:var(--text-muted)">' + myReqs.length + ' בקשות</span>';
    return '<div class="soldier-row">' +
      '<div class="soldier-avatar">' + s.name.charAt(0) + '</div>' +
      '<div class="soldier-info"><div class="soldier-name">' + s.name + '</div>' +
      '<div class="soldier-reqs">' + myReqs.length + ' בקשות | ' + pending + ' ממתינות</div></div>' +
      badge + '</div>';
  }).join('');
}

window.addSoldier = function() {
  var name = document.getElementById('newSoldierName').value.trim();
  if (!name) return;
  var exists = Object.values(allSoldiers).some(function(s){ return s.name === name; });
  if (exists) { showToast('❗ לוחם עם שם זה כבר קיים'); return; }
  var nr = push(ref(db, 'soldiers'));
  set(nr, { id: nr.key, name: name });
  document.getElementById('newSoldierName').value = '';
  showToast('✅ לוחם נוסף: ' + name);
};

window.approveReq = function(id) {
  update(ref(db, 'requests/' + id), { status: 'approved' });
  showToast('✅ הבקשה אושרה');
  refreshModal();
};
window.rejectReq = function(id) {
  update(ref(db, 'requests/' + id), { status: 'rejected' });
  showToast('❌ הבקשה נדחתה');
  refreshModal();
};
window.setFilter = function(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b,i){
    b.classList.toggle('active', ['all','pending','approved','rejected'][i] === f);
  });
  renderAllRequests();
};

// ====== MODALS ======
window.openSoldierModal = function(soldierId) {
  var soldier = allSoldiers[soldierId];
  if (!soldier) return;
  var reqs = Object.values(allRequests).filter(function(r){ return r.soldierId === soldierId; });
  reqs.sort(function(a,b){ return new Date(b.createdAt) - new Date(a.createdAt); });
  document.getElementById('modalSoldierName').textContent = soldier.name;
  var el = document.getElementById('modalRequestsList');
  el.innerHTML = reqs.length === 0
    ? '<div class="empty-state"><div class="empty-icon">📭</div>אין בקשות</div>'
    : reqs.map(function(r){ return buildReqCard(r, true); }).join('');
  document.getElementById('soldierModal').classList.add('active');
};

function refreshModal() {
  var modal = document.getElementById('soldierModal');
  if (!modal.classList.contains('active')) return;
  var name = document.getElementById('modalSoldierName').textContent;
  var sid  = Object.keys(allSoldiers).find(function(k){ return allSoldiers[k].name === name; });
  if (sid) openSoldierModal(sid);
}

window.closeModal = function(id) {
  document.getElementById(id).classList.remove('active');
};

['soldierModal','dayModal'].forEach(function(id){
  document.getElementById(id).addEventListener('click', function(e){ if (e.target === this) closeModal(id); });
});

// ====== HELPERS ======
function buildReqCard(r, isAdmin) {
  var labels = { pending: 'ממתין לאישור', approved: 'אושר ✅', rejected: 'נדחה ❌' };
  var soldierHtml  = isAdmin ? '<div class="req-name">' + r.soldierName + '</div>' : '';
  var actionsHtml  = (isAdmin && r.status === 'pending')
    ? '<div class="req-actions"><button class="btn-approve" onclick="approveReq(\'' + r.id + '\')">אשר ✅</button><button class="btn-reject" onclick="rejectReq(\'' + r.id + '\')">דחה ❌</button></div>' : '';
  return '<div class="req-card ' + r.status + '">' +
    '<div class="req-header">' + soldierHtml + '<span class="badge badge-' + r.status + '">' + labels[r.status] + '</span></div>' +
    '<div class="req-dates"><span>📅 יציאה: <strong>' + fmtDate(r.dateOut) + '</strong></span><span>🔄 חזרה: <strong>' + fmtDate(r.dateIn) + '</strong></span></div>' +
    '<div class="req-reason">' + r.reason + '</div>' + actionsHtml + '</div>';
}

function fmtDate(d) {
  if (!d) return '';
  var p = d.split('-'); return p[2]+'/'+p[1]+'/'+p[0];
}

var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 3000);
}
window.showToast = showToast;
</script>
</body>
</html>
